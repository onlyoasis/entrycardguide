baseURL = "https://entrycardguide.com/"
title = "entrycardguide"
enableGitInfo = true
enableRobotsTXT = true
summaryLength = 30
disableKinds = ["taxonomy", "term"]

# Multilingual setup
# - English at root: /, /thailand/, /about/
# - 简体中文 at /zh/: /zh/, /zh/thailand/, /zh/about/
# - Content uses file-suffix mode: foo.md (en) + foo.zh.md (zh)
# - When a Chinese translation does not exist, the language switcher
#   falls back to /zh/ (homepage), so users never hit a 404.
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    title = "entrycardguide"
    [languages.en.params]
      description = "Independent. Free. Anti-scam entry card guides for international travelers."
    # Country pages are intentionally NOT listed in the main menu. The header
    # renders one "Countries" dropdown from layouts/partials/country-roster.html,
    # so the nav never overflows as the roster grows (11 → 30+). Keep only the
    # cross-cutting destinations below.
    [[languages.en.menu.main]]
      identifier = "decide"
      name = "Decide"
      url = "/decide/"
      weight = 5
    [[languages.en.menu.main]]
      identifier = "official-links"
      name = "Official Links"
      url = "/official-links/"
      weight = 75
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About"
      url = "/about/"
      weight = 80

  [languages.zh]
    languageName = "简体中文"
    languageCode = "zh-cn"
    weight = 2
    title = "entrycardguide · 入境卡指南"
    [languages.zh.params]
      description = "独立、免费、反诈骗的入境卡填写指南。"
    # 国家页不放进主菜单：header 从 layouts/partials/country-roster.html 渲染
    # 一个「国家」下拉，roster 增长（11 → 30+）时导航永不折行。这里只保留跨页目的地。
    [[languages.zh.menu.main]]
      identifier = "decide"
      name = "决策工具"
      url = "/zh/decide/"
      weight = 5
    [[languages.zh.menu.main]]
      identifier = "official-links"
      name = "官方目录"
      url = "/zh/official-links/"
      weight = 75
    [[languages.zh.menu.main]]
      identifier = "about"
      name = "关于"
      url = "/zh/about/"
      weight = 80

# llms.txt — plain-text site index for LLM crawlers (llmstxt.org convention).
# 44% of active users arrive from ChatGPT and other AI assistants, so this file
# is a first-class surface, not an afterthought. It is GENERATED from
# data/official_urls/*.toml by layouts/index.llms.txt: change a URL, agency, or
# fee in the TOML and llms.txt follows. Never hand-write it — a second copy of
# the official URLs is exactly the kind of drift this site exists to prevent.
# notAlternative keeps it out of hreflang so check:seo stays happy.
[outputFormats]
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "LLMS"]

[params]
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowLastMod = true
  disableSpecial1stPost = true
  disableScrollToTop = false
  hideFooter = false

  [params.author]
    name = "entrycardguide"

  [params.affiliate]
    safetywing_url = "https://safetywing.com/?referenceID=26517368&utm_source=26517368&utm_medium=Ambassador"
    airalo_url = ""

  [params.analytics.ga4.measurement]
    id = "G-8C2Q42N506"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

[security]
  [security.funcs]
    getenv = ["^HUGO_", "^CI$", "^GITHUB_"]
