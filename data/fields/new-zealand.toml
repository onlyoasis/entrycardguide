# New Zealand NZTD — field-by-field display data for the how-to-fill layout.

[[fields]]
n = "01"
key = "passport_number"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "A12345678"
mistake = "A12345678<"
mistake_why_en = "MRZ filler mark copied with the passport number"
mistake_why_zh = "把机读区填充符和护照号一起复制了"
copy_en = "Copy the number from the passport you will use to enter New Zealand. Do not add spaces or MRZ filler marks."
copy_zh = "填写入境新西兰时使用的护照号。不要加入空格或机读区填充符。"

[[fields]]
n = "02"
key = "passport_expiry"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "2028-09-30"
mistake = "1991-08-22"
mistake_why_en = "date of birth entered instead of passport expiry"
mistake_why_zh = "把出生日期填进了护照到期日"
copy_en = "Match the passport expiry date. This local checker uses YYYY-MM-DD; use the date controls on the NZTD form."
copy_zh = "按护照填写到期日。本地检查器使用 YYYY-MM-DD；NZTD 官网请使用日期控件。"

[[fields]]
n = "03"
key = "family_name"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "YAMADA"
mistake = "MR YAMADA"
mistake_why_en = "title added even though it is not part of the passport name"
mistake_why_zh = "护照姓名里没有头衔，却多填了 MR"
copy_en = "Enter every surname or family name in the English or Latin spelling shown on the passport."
copy_zh = "按护照上的英文或 Latin 拼写填写全部姓。"

[[fields]]
n = "04"
key = "given_names"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "TARO KEN"
mistake = "TARO"
mistake_why_en = "middle given name omitted"
mistake_why_zh = "漏填了护照上的中间名"
copy_en = "Enter all given names from the passport used for the trip, including middle given names."
copy_zh = "填写本次旅行护照上的全部名，包括中间名。"

[[fields]]
n = "05"
key = "date_of_birth"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "1991-08-22"
mistake = "1991-22-08"
mistake_why_en = "day and month reversed in the local checker"
mistake_why_zh = "在本地检查器里把日和月写反了"
copy_en = "Match the passport date. This local checker uses YYYY-MM-DD; use the official form's date controls when submitting."
copy_zh = "日期要和护照一致。本地检查器使用 YYYY-MM-DD；正式提交时使用官网日期控件。"

[[fields]]
n = "06"
key = "country_of_birth"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "Japan"
mistake = "New Zealand"
mistake_why_en = "destination entered instead of country of birth"
mistake_why_zh = "把目的地填成了出生国家"
copy_en = "Use the country of birth requested by NZTD. Answers in the declaration must be in English."
copy_zh = "按 NZTD 要求填写出生国家。申报答案必须使用英文。"

[[fields]]
n = "07"
key = "nationality"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "Japan"
mistake = "Singapore"
mistake_why_en = "transit country selected instead of passport nationality"
mistake_why_zh = "把转机国家选成了护照国籍"
copy_en = "Select the nationality shown on the passport you will present when entering New Zealand."
copy_zh = "选择入境新西兰时出示的护照所载国籍。"

[[fields]]
n = "08"
key = "arrival_date"
section_en = "Section 2 · Travel"
section_zh = "第 2 段 · 行程"
example = "2026-09-15"
mistake = "2026-09-14"
mistake_why_en = "departure date entered instead of New Zealand arrival date"
mistake_why_zh = "填了出发日期，没有填抵达新西兰日期"
copy_en = "Use the date the flight or vessel reaches New Zealand. Check the local arrival date across time zones."
copy_zh = "填写航班或船舶抵达新西兰的日期。跨时区旅行要核对当地抵达日。"

[[fields]]
n = "09"
key = "arrival_method"
section_en = "Section 2 · Travel"
section_zh = "第 2 段 · 行程"
example = "Air"
mistake = "Sea"
mistake_why_en = "sea selected for an arriving flight"
mistake_why_zh = "搭飞机抵达，却选择了海运"
copy_en = "Choose air or sea. NZTD then shows either flight fields or vessel and port fields."
copy_zh = "选择空路或海路。NZTD 会据此显示航班字段，或船舶与港口字段。"

[[fields]]
n = "10"
key = "flight_number"
section_en = "Section 2 · Travel"
section_zh = "第 2 段 · 行程"
example = "NZ1"
mistake = "ABC123"
mistake_why_en = "booking reference entered instead of the arriving flight number"
mistake_why_zh = "把订位编号填成了抵达航班号"
copy_en = "Air travellers should enter the flight that lands in New Zealand. Sea travellers use the vessel and port questions instead."
copy_zh = "空路旅客填写落地新西兰的航班号。海路旅客改填船舶和港口问题。"

[[fields]]
n = "11"
key = "email"
section_en = "Section 3 · Contact"
section_zh = "第 3 段 · 联系方式"
example = "travel@gmail.com"
mistake = "travel@gmial.com"
mistake_why_en = "domain typo blocks the NZTD reference email"
mistake_why_zh = "域名拼错，收不到 NZTD 参考编号邮件"
copy_en = "Use an inbox you control and check the domain before continuing. NZTD sends the reference number here."
copy_zh = "使用自己掌握的邮箱，继续前核对域名。NZTD 会把参考编号发到这里。"

[[fields]]
n = "12"
key = "phone"
section_en = "Section 3 · Contact"
section_zh = "第 3 段 · 联系方式"
example = "+81 90 1234 5678"
mistake = "090 1234 5678"
mistake_why_en = "country code omitted from an international contact number"
mistake_why_zh = "国际联系电话漏了国家或地区代码"
copy_en = "Include the country or region code and a number where you can be reached."
copy_zh = "填写国家或地区代码，以及可以联系到你的号码。"

[[fields]]
n = "13"
key = "nz_address"
section_en = "Section 3 · Contact"
section_zh = "第 3 段 · 联系方式"
example = "Hotel Britomart, Auckland"
mistake = "Auckland, Rotorua, Wellington"
mistake_why_en = "an itinerary entered instead of the first New Zealand address"
mistake_why_zh = "填了整段行程，没有填抵达后的第一个新西兰地址"
copy_en = "Enter the full contact or residential address in New Zealand. If staying in several places, use the first address."
copy_zh = "填写新西兰的完整联系或居住地址。住多个地点时，填写第一个地址。"

[[fields]]
n = "14"
key = "travel_history"
section_en = "Section 4 · Trip and status"
section_zh = "第 4 段 · 行程与身份"
example = "Japan, Singapore"
mistake = "Japan only"
mistake_why_en = "Singapore airport transit omitted from the last 30 days"
mistake_why_zh = "漏填了过去 30 天内在新加坡机场的过境"
copy_en = "List every country visited outside New Zealand during the previous 30 days, including transit stops."
copy_zh = "列出过去 30 天内到过的所有新西兰以外国家，包括转机或过境。"

[[fields]]
n = "15"
key = "immigration_status"
section_en = "Section 4 · Trip and status"
section_zh = "第 4 段 · 行程与身份"
example = "I do not hold a visa and am applying for a visitor visa on arrival"
mistake = "New Zealand resident"
mistake_why_en = "status selected without holding the matching passport or visa"
mistake_why_zh = "没有对应护照或签证，却选择了新西兰居民身份"
copy_en = "Choose the option that matches your passport and current visa or residence documents. NZeTA and NZTD are separate requirements."
copy_zh = "按护照和当前签证或居留文件选择。NZeTA 与 NZTD 是两项独立要求。"

[[fields]]
n = "16"
key = "restricted_items"
section_en = "Section 5 · Declarations"
section_zh = "第 5 段 · 申报"
example = "Yes · NZD 12,000 cash"
mistake = "No"
mistake_why_en = "cash at or above NZD 10,000 not declared"
mistake_why_zh = "携带达到 10,000 新西兰元的现金，却选择了 No"
copy_en = "Answer each medicines, restricted-goods, allowance, business-goods, other-person, and cash question separately."
copy_zh = "逐项回答药品、限制品、免税额度、商用品、代他人携带物品和现金问题。"

[[fields]]
n = "17"
key = "biosecurity_items"
section_en = "Section 5 · Declarations"
section_zh = "第 5 段 · 申报"
example = "Yes · packaged food"
mistake = "No, because it is sealed"
mistake_why_en = "packaged food treated as exempt from declaration"
mistake_why_zh = "因为食品有密封包装，就误以为不用申报"
copy_en = "Declare food, animal or plant products, soil or water, used outdoor equipment, and relevant animal, farm, or wilderness contact. When unsure, declare it."
copy_zh = "申报食品、动植物制品、土壤或水、用过的户外装备，以及相关动物、农场或荒野接触。不确定时就申报。"

[[fields]]
n = "18"
key = "declaration"
section_en = "Section 5 · Declarations"
section_zh = "第 5 段 · 申报"
example = "Confirmed after review"
mistake = "Confirmed before checking bags"
mistake_why_en = "legal declaration accepted before the answers were checked"
mistake_why_zh = "没有核对答案和行李，就确认了法律声明"
copy_en = "Confirm only after reviewing every answer. If you change anything later, resubmit before passport control or border processing."
copy_zh = "核对全部答案后再确认。之后如有修改，要在护照查验或边境处理前重新提交。"
