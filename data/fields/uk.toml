# United Kingdom ETA — field-by-field display data for the how-to-fill layout.

[[fields]]
n = "01"
key = "passport"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "123456789"
mistake = "123456789<"
mistake_why_en = "MRZ filler character copied with the passport number"
mistake_why_zh = "把 MRZ 填充符和护照号一起复制了"
copy_en = "Use the passport you will carry. The app photographs the original passport and may scan its chip; the online route needs a clear photo of the passport page."
copy_zh = "使用这次旅行随身携带的护照。App 会拍摄护照原件并可能扫描芯片；网页申请需要清晰的护照资料页照片。"

[[fields]]
n = "02"
key = "full_name"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "TARO YAMADA"
mistake = "TARO Y."
mistake_why_en = "airline-ticket abbreviation used instead of the full passport name"
mistake_why_zh = "照抄了机票缩写，没有填写护照全名"
copy_en = "Check every family and given name read from the passport photo or chip. Correct any scan error before continuing."
copy_zh = "核对从护照照片或芯片读取的全部姓和名。继续前改正所有识别错误。"

[[fields]]
n = "03"
key = "date_of_birth"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "1991-08-22"
mistake = "1991-22-08"
mistake_why_en = "day and month reversed in the local checker"
mistake_why_zh = "在本地检查器里把日和月写反了"
copy_en = "Match the passport date. This local checker uses YYYY-MM-DD; use the controls provided by the official application."
copy_zh = "日期要和护照一致。本地检查器使用 YYYY-MM-DD；官网申请请用页面提供的日期控件。"

[[fields]]
n = "04"
key = "email"
section_en = "Section 2 · Contact"
section_zh = "第 2 段 · 联系方式"
example = "travel@gmail.com"
mistake = "travel@gmial.com"
mistake_why_en = "domain typo blocks the decision email and 16-digit reference number"
mistake_why_zh = "域名拼错，收不到决定邮件和 16 位参考编号"
copy_en = "Use an inbox you control and can open while travelling. Check the spelling before payment."
copy_zh = "使用自己掌握、旅行途中也能打开的邮箱。付款前再核对一次拼写。"

[[fields]]
n = "05"
key = "home_address"
section_en = "Section 2 · Contact"
section_zh = "第 2 段 · 联系方式"
example = "12 King St, London, United Kingdom"
mistake = "Hilton London Metropole"
mistake_why_en = "hotel entered instead of the applicant's current home address"
mistake_why_zh = "把酒店地址填成了申请人的当前住址"
copy_en = "Enter your current home address. Keep it separate from any travel accommodation."
copy_zh = "填写当前家庭住址。不要和旅行住宿地址混在一起。"

[[fields]]
n = "06"
key = "job"
section_en = "Section 3 · Personal details"
section_zh = "第 3 段 · 个人资料"
example = "Software engineer"
mistake = "ABC Ltd"
mistake_why_en = "employer name entered where the job or occupation belongs"
mistake_why_zh = "把雇主名称填进了职业栏"
copy_en = "Describe your current job or situation accurately. Do not invent an employer if you are unemployed, retired, or studying."
copy_zh = "如实填写当前职业或状态。失业、退休或在读时不要编造雇主。"

[[fields]]
n = "07"
key = "other_nationalities"
section_en = "Section 3 · Personal details"
section_zh = "第 3 段 · 个人资料"
example = "No"
mistake = "No, but I hold another passport"
mistake_why_en = "another nationality omitted because its passport was not being used for this trip"
mistake_why_zh = "因为本次不用另一本护照，就漏报了另一国籍"
copy_en = "Answer for every nationality you hold, not only the passport used for this trip. Add the details requested after a Yes answer."
copy_zh = "按实际持有的全部国籍回答，不只看本次使用的护照。选择 Yes 后补齐页面要求的资料。"

[[fields]]
n = "08"
key = "criminal_convictions"
section_en = "Section 4 · Background"
section_zh = "第 4 段 · 背景问题"
example = "No"
mistake = "No, because the fine was small"
mistake_why_en = "a conviction omitted based on the applicant's own view of seriousness"
mistake_why_zh = "因为自认为罚款不严重，就漏报了定罪记录"
copy_en = "Answer truthfully. For Yes, give the offence, conviction date, and sentence in as much detail as possible."
copy_zh = "如实回答。选择 Yes 时，尽量详细填写罪名、定罪日期和处罚。"

[[fields]]
n = "09"
key = "parent_contact"
section_en = "Section 4 · Background"
section_zh = "第 4 段 · 背景问题"
example = "HANAKO YAMADA, parent, hanako@example.com"
mistake = "(blank for a 16-year-old)"
mistake_why_en = "parental-responsibility contact omitted for an applicant under 18"
mistake_why_zh = "未满 18 岁的申请人漏填了监护责任人联系方式"
copy_en = "Complete this only for an applicant under 18. The applicant also needs a face photo; an app applicant aged 10 or over needs a face scan."
copy_zh = "仅未满 18 岁的申请人填写。申请人还需要人脸照片；使用 App 且年满 10 岁时还要做人脸扫描。"
