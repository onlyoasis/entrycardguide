# Turkey e-Visa — field-by-field display data for the how-to-fill layout.

[[fields]]
n = "01"
key = "nationality"
section_en = "Section 1 · Eligibility"
section_zh = "第 1 段 · 资格"
example = "India"
mistake = "United Kingdom"
mistake_why_en = "country of residence selected instead of passport nationality"
mistake_why_zh = "把居住国选成了护照国籍"
copy_en = "Choose the nationality or region of the passport used for travel. This answer controls exemption, eligibility, conditions, and price."
copy_zh = "选择本次旅行护照所载国籍或地区。该答案决定免签、申请资格、附加条件和费用。"

[[fields]]
n = "02"
key = "travel_document_type"
section_en = "Section 1 · Eligibility"
section_zh = "第 1 段 · 资格"
example = "Ordinary Passport"
mistake = "Official Passport"
mistake_why_en = "passport type guessed from the cover colour"
mistake_why_zh = "按封面颜色猜了护照类型"
copy_en = "Select the exact document type. Ordinary and official passports can have different visa rules."
copy_zh = "选择准确的证件类型。普通护照和公务类护照可能适用不同签证规则。"

[[fields]]
n = "03"
key = "arrival_date"
section_en = "Section 1 · Eligibility"
section_zh = "第 1 段 · 资格"
example = "2026-09-15"
mistake = "2026-09-14"
mistake_why_en = "departure date entered instead of Türkiye arrival date"
mistake_why_zh = "填了出发日期，没有填抵达土耳其日期"
copy_en = "Use the planned first arrival date. The e-Visa validity period starts from the date selected."
copy_zh = "填写计划首次抵达日期。e-Visa 有效期从所选日期开始计算。"

[[fields]]
n = "04"
key = "given_names"
section_en = "Section 2 · Applicant"
section_zh = "第 2 段 · 申请人"
example = "TARO KEN"
mistake = "TARO"
mistake_why_en = "middle given name omitted"
mistake_why_zh = "漏填了护照上的中间名"
copy_en = "Enter every given name from the passport, in the same order and spelling. Maximum 50 characters."
copy_zh = "按护照顺序和拼写填写全部名，最多 50 个字符。"

[[fields]]
n = "05"
key = "surname"
section_en = "Section 2 · Applicant"
section_zh = "第 2 段 · 申请人"
example = "YAMADA"
mistake = "MR YAMADA"
mistake_why_en = "title added even though it is not part of the passport surname"
mistake_why_zh = "护照姓氏里没有头衔，却多填了 MR"
copy_en = "Copy the surname from the passport. Leave it blank only if the passport has no surname. Maximum 50 characters."
copy_zh = "按护照填写姓。护照确实没有姓时才留空，最多 50 个字符。"

[[fields]]
n = "06"
key = "date_of_birth"
section_en = "Section 2 · Applicant"
section_zh = "第 2 段 · 申请人"
example = "1991-08-22"
mistake = "1991-22-08"
mistake_why_en = "day and month reversed in the local checker"
mistake_why_zh = "在本地检查器里把日和月写反了"
copy_en = "Match the passport date. This local checker uses YYYY-MM-DD."
copy_zh = "日期要和护照一致。本地检查器使用 YYYY-MM-DD。"

[[fields]]
n = "07"
key = "place_of_birth"
section_en = "Section 2 · Applicant"
section_zh = "第 2 段 · 申请人"
example = "TOKYO"
mistake = "JAPAN"
mistake_why_en = "country entered when the passport prints a city"
mistake_why_zh = "护照写的是城市，却填成了国家"
copy_en = "Copy the place of birth exactly from the passport. Maximum 40 characters."
copy_zh = "按护照原样填写出生地，最多 40 个字符。"

[[fields]]
n = "08"
key = "mothers_name"
section_en = "Section 2 · Applicant"
section_zh = "第 2 段 · 申请人"
example = "HANAKO YAMADA"
mistake = "HANAKO"
mistake_why_en = "part of the requested name omitted"
mistake_why_zh = "漏填了要求填写的部分姓名"
copy_en = "Enter all requested names. Leave blank only when the official flow permits it. Maximum 40 characters."
copy_zh = "填写要求的全部姓名。官网允许时才能留空，最多 40 个字符。"

[[fields]]
n = "09"
key = "fathers_name"
section_en = "Section 2 · Applicant"
section_zh = "第 2 段 · 申请人"
example = "ICHIRO YAMADA"
mistake = "ICHIRO"
mistake_why_en = "part of the requested name omitted"
mistake_why_zh = "漏填了要求填写的部分姓名"
copy_en = "Enter all requested names. Leave blank only when the official flow permits it. Maximum 40 characters."
copy_zh = "填写要求的全部姓名。官网允许时才能留空，最多 40 个字符。"

[[fields]]
n = "10"
key = "passport_number"
section_en = "Section 3 · Travel document"
section_zh = "第 3 段 · 旅行证件"
example = "A12345678"
mistake = "A12345678<"
mistake_why_en = "MRZ filler mark copied with the document number"
mistake_why_zh = "把机读区填充符和证件号一起复制了"
copy_en = "Copy the travel document number with no spaces or special characters. Maximum 16 characters."
copy_zh = "填写旅行证件号，不加空格或特殊字符，最多 16 个字符。"

[[fields]]
n = "11"
key = "passport_issue_date"
section_en = "Section 3 · Travel document"
section_zh = "第 3 段 · 旅行证件"
example = "2023-09-30"
mistake = "2033-09-29"
mistake_why_en = "expiry date entered instead of issue date"
mistake_why_zh = "把到期日填进了签发日期"
copy_en = "Match the issue date on the travel document. This local checker uses YYYY-MM-DD."
copy_zh = "按旅行证件填写签发日期。本地检查器使用 YYYY-MM-DD。"

[[fields]]
n = "12"
key = "passport_expiry"
section_en = "Section 3 · Travel document"
section_zh = "第 3 段 · 旅行证件"
example = "2033-09-29"
mistake = "2026-10-01"
mistake_why_en = "expiry may not cover the stay plus Türkiye's additional validity rule"
mistake_why_zh = "有效期可能不足以覆盖停留期和土耳其额外要求"
copy_en = "Match the expiry date, then check that it satisfies the official eligibility result and the additional 60-day rule."
copy_zh = "按证件填写到期日，再核对官网资格结果和额外 60 天有效期规则。"

[[fields]]
n = "13"
key = "email"
section_en = "Section 4 · Contact"
section_zh = "第 4 段 · 联系方式"
example = "travel@gmail.com"
mistake = "travel@gmial.com"
mistake_why_en = "domain typo blocks the payment and download links"
mistake_why_zh = "邮箱域名拼错，收不到付款和下载链接"
copy_en = "Use a lowercase inbox you control. The official group guide sets a 40-character maximum."
copy_zh = "使用自己掌握的小写邮箱。官方团体申请指南上限为 40 个字符。"

[[fields]]
n = "14"
key = "phone"
section_en = "Section 4 · Contact"
section_zh = "第 4 段 · 联系方式"
example = "+91 98765 43210"
mistake = "098765 43210"
mistake_why_en = "country code omitted from an international number"
mistake_why_zh = "国际联系电话漏了国家或地区代码"
copy_en = "Include the country or region code. The official group guide allows up to 20 displayed characters."
copy_zh = "填写国家或地区代码。官方团体申请指南允许最多 20 个显示字符。"

[[fields]]
n = "15"
key = "home_address"
section_en = "Section 4 · Contact"
section_zh = "第 4 段 · 联系方式"
example = "12 Park St, Mumbai, India"
mistake = "Istanbul hotel"
mistake_why_en = "Türkiye accommodation entered instead of the applicant's residence"
mistake_why_zh = "把土耳其住宿填成了申请人的居住地址"
copy_en = "Enter the applicant's current residence address. Maximum 200 characters."
copy_zh = "填写申请人当前居住地址，最多 200 个字符。"

[[fields]]
n = "16"
key = "supporting_document_type"
section_en = "Section 5 · Conditional eligibility"
section_zh = "第 5 段 · 有条件资格"
example = "Residence permit"
mistake = "Visa"
mistake_why_en = "wrong supporting-document type selected"
mistake_why_zh = "选错了附加证明类型"
copy_en = "Complete this only when the official result requires support. Choose the document actually held."
copy_zh = "官网资格结果要求时才填写，并选择自己实际持有的证明类型。"

[[fields]]
n = "17"
key = "supporting_document_issuer"
section_en = "Section 5 · Conditional eligibility"
section_zh = "第 5 段 · 有条件资格"
example = "Schengen"
mistake = "Türkiye"
mistake_why_en = "destination selected instead of the supporting document issuer"
mistake_why_zh = "把目的地选成了附加证明签发方"
copy_en = "Select the country or area that issued the valid visa or residence permit. Follow the exact eligibility screen."
copy_zh = "选择有效签证或居留许可的签发国家或地区，并以官网资格页面为准。"

[[fields]]
n = "18"
key = "supporting_document_expiry"
section_en = "Section 5 · Conditional eligibility"
section_zh = "第 5 段 · 有条件资格"
example = "2027-05-31"
mistake = "2026-06-30"
mistake_why_en = "expired supporting document used for a conditional application"
mistake_why_zh = "有条件申请使用了已经过期的附加证明"
copy_en = "Enter the expiry date when the supporting document has one and confirm it remains valid under the official conditions."
copy_zh = "附加证明有到期日时据实填写，并确认在官网条件下仍然有效。"
