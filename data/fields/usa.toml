# United States ESTA — field-by-field display data for the how-to-fill layout.

[[fields]]
n = "01"
key = "passport"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "A12345678"
mistake = "A12345678<"
mistake_why_en = "MRZ filler character copied with the passport number"
mistake_why_zh = "把 MRZ 填充符和护照号一起复制了"
copy_en = "Copy only the passport number from the photo page. Use the VWP e-passport you will carry to the United States."
copy_zh = "只抄资料页上的护照号。使用这次赴美时随身携带的 VWP 电子护照。"

[[fields]]
n = "02"
key = "full_name"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "TARO YAMADA"
mistake = "山田 太郎"
mistake_why_en = "non-Latin name used instead of the passport spelling"
mistake_why_zh = "用了非 Latin 姓名，没有照抄护照拼写"
copy_en = "Enter every family and given name in the Latin spelling printed on the passport. Do not follow a shortened airline-ticket name."
copy_zh = "按护照上的 Latin 拼写填写全部姓和名。不要照抄机票上的姓名缩写。"

[[fields]]
n = "03"
key = "date_of_birth"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "1991-08-22"
mistake = "08/22/1991"
mistake_why_en = "US date format used in the local checker"
mistake_why_zh = "在本地检查器里用了美式日期格式"
copy_en = "Match the passport date. This local checker uses YYYY-MM-DD; on the ESTA site, use its date controls."
copy_zh = "日期要和护照一致。本地检查器使用 YYYY-MM-DD；ESTA 官网请用页面提供的日期控件。"

[[fields]]
n = "04"
key = "email"
section_en = "Section 2 · Contact"
section_zh = "第 2 段 · 联系方式"
example = "travel@gmail.com"
mistake = "travel@gmial.com"
mistake_why_en = "domain typo blocks verification and application-number email"
mistake_why_zh = "域名拼错，收不到验证邮件和申请编号"
copy_en = "Use an inbox you control and can open while traveling. Check the domain before continuing."
copy_zh = "使用自己掌握、旅行途中也能打开的邮箱。继续前再核对一次域名。"

[[fields]]
n = "05"
key = "phone"
section_en = "Section 2 · Contact"
section_zh = "第 2 段 · 联系方式"
example = "+44 20 7946 0958"
mistake = "020 7946 0958"
mistake_why_en = "country code omitted from an international contact number"
mistake_why_zh = "国际联系电话漏了国家或地区代码"
copy_en = "Include the country code and a reachable number. If you have no phone, CBP permits a reachable third-party number."
copy_zh = "填写国家或地区代码和可接通的号码。本人没有电话时，CBP 允许填写能联系到的第三方号码。"

[[fields]]
n = "06"
key = "home_address"
section_en = "Section 2 · Contact"
section_zh = "第 2 段 · 联系方式"
example = "12 King St, London, United Kingdom"
mistake = "Hilton New York Times Square"
mistake_why_en = "US hotel entered where the current home address belongs"
mistake_why_zh = "把美国酒店填进了当前家庭住址栏"
copy_en = "Enter your current street, city, region, and country. The US place of stay is requested separately."
copy_zh = "填写目前居住的街道、城市、州省和国家或地区。美国住宿地点会在别处单独询问。"

[[fields]]
n = "07"
key = "employer"
section_en = "Section 3 · Employment"
section_zh = "第 3 段 · 就业"
example = "No"
mistake = "(blank)"
mistake_why_en = "the Yes-or-No employer question was skipped because there is no job to report"
mistake_why_zh = "因为没有工作，误以为可以跳过雇主是非题"
copy_en = "Answer Yes or No even when you have no current employer. If Yes, enter the current or previous employer details requested."
copy_zh = "即使目前没有雇主，也要回答 Yes 或 No。选择 Yes 时，再填写要求的现任或曾任雇主资料。"

[[fields]]
n = "08"
key = "us_contact"
section_en = "Section 4 · US details"
section_zh = "第 4 段 · 美国资料"
example = "UNKNOWN"
mistake = "John Smith, 555-1234"
mistake_why_en = "contact details invented instead of using UNKNOWN"
mistake_why_zh = "不知道联系人时乱编资料，没有填写 UNKNOWN"
copy_en = "Use a friend, relative, business contact, hotel, or place of stay. If you do not know the information, enter UNKNOWN."
copy_zh = "可填写朋友、亲属、商务联系人、酒店或住宿地点。不知道资料时填写 UNKNOWN。"

[[fields]]
n = "09"
key = "social_media"
section_en = "Section 4 · US details"
section_zh = "第 4 段 · 美国资料"
example = "(blank)"
mistake = "@made_up_handle"
mistake_why_en = "Optional was treated as required, so an identifier was invented"
mistake_why_zh = "把 Optional 当成必填，焦虑之下编了账号标识"
copy_en = "The official printable ESTA application marks this section Optional. Add listed identifiers if you choose, or leave it blank."
copy_zh = "ESTA 官方可打印申请表把此栏标为 Optional。可自行选择是否填写列表中的账号标识，也可以留空。"
