# Canada eTA — field-by-field display data for the how-to-fill layout.

[[fields]]
n = "01"
key = "passport"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "AB1234567"
mistake = "AB 123-4567"
mistake_why_en = "spaces and a hyphen added to a passport number"
mistake_why_zh = "给护照号加了空格和连字符"
copy_en = "Use the number at the top of the passport photo page. Do not use the number on the first page or the machine-readable line at the bottom."
copy_zh = "填写护照资料页顶部的号码。不要抄首页号码，也不要抄资料页底部机读区的号码。"

[[fields]]
n = "02"
key = "family_name"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "YAMADA"
mistake = "MR YAMADA"
mistake_why_en = "title added even though it is not part of the machine-readable name"
mistake_why_zh = "机读姓名里没有头衔，却多填了 MR"
copy_en = "Enter all family names from the passport. Use the lower machine-readable line to confirm order and the upper text for any full spelling."
copy_zh = "填写护照上的全部姓。用底部机读区确认顺序；机读区有截断时，以上方完整拼写为准。"

[[fields]]
n = "03"
key = "given_names"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "TARO KEN"
mistake = "TARO"
mistake_why_en = "middle given name omitted from the passport spelling"
mistake_why_zh = "漏填了护照上的中间名"
copy_en = "Enter every given name. Keep passport apostrophes, hyphens, and French accents, but do not add a title or a spouse's name unless it is part of the machine-readable name."
copy_zh = "填写全部名。保留护照里的撇号、连字符和法语重音；机读姓名未包含的头衔或配偶姓名不要加入。"

[[fields]]
n = "04"
key = "date_of_birth"
section_en = "Section 1 · Passport"
section_zh = "第 1 段 · 护照"
example = "1991-08-22"
mistake = "1991-22-08"
mistake_why_en = "day and month reversed in the local checker"
mistake_why_zh = "在本地检查器里把日和月写反了"
copy_en = "Match the passport date. This local checker uses YYYY-MM-DD; use the official form's date controls when applying."
copy_zh = "日期要和护照一致。本地检查器使用 YYYY-MM-DD；正式申请时使用官网日期控件。"

[[fields]]
n = "05"
key = "place_of_birth"
section_en = "Section 2 · Personal details"
section_zh = "第 2 段 · 个人资料"
example = "Tokyo, Japan"
mistake = "London, United Kingdom"
mistake_why_en = "current residence entered instead of the passport place of birth"
mistake_why_zh = "把当前居住地填成了护照出生地"
copy_en = "Use the birth country shown on the passport and the city, town, or village requested by the form."
copy_zh = "国家按护照出生地填写，并补上表格要求的城市、城镇或村庄。"

[[fields]]
n = "06"
key = "marital_status"
section_en = "Section 2 · Personal details"
section_zh = "第 2 段 · 个人资料"
example = "Never Married/Single"
mistake = "Single after a legal divorce"
mistake_why_en = "Never Married selected even though the current legal status is Divorced"
mistake_why_zh = "已经依法离婚，却选择了从未结婚"
copy_en = "Choose the current legal status using IRCC's listed definitions. Common-law means living in a marriage-like relationship continuously for at least one year."
copy_zh = "按 IRCC 列出的定义选择当前法律状态。Common-law 指连续同居至少一年、关系类似婚姻。"

[[fields]]
n = "07"
key = "occupation"
section_en = "Section 2 · Personal details"
section_zh = "第 2 段 · 个人资料"
example = "Student · Waseda University · Tokyo · since 2024"
mistake = "Unemployed"
mistake_why_en = "Unemployed selected even though the applicant is currently a student"
mistake_why_zh = "申请人目前在读，却选择了失业"
copy_en = "Choose the closest occupation. Add the job title and employer or school details when the form asks for them."
copy_zh = "选择最接近的职业类别。页面要求时，再填写职务及雇主或学校资料。"

[[fields]]
n = "08"
key = "email"
section_en = "Section 3 · Contact"
section_zh = "第 3 段 · 联系方式"
example = "travel@gmail.com"
mistake = "travel@gmial.com"
mistake_why_en = "domain typo blocks the approval email or document request"
mistake_why_zh = "域名拼错，收不到批准邮件或补件通知"
copy_en = "Use an inbox you control. A parent applying for a minor may use the parent's email address."
copy_zh = "使用自己掌握的邮箱。父母为未成年人申请时，可以填写父母的邮箱。"

[[fields]]
n = "09"
key = "home_address"
section_en = "Section 3 · Contact"
section_zh = "第 3 段 · 联系方式"
example = "12 King Street, London, SW1A 1AA, United Kingdom"
mistake = "PO Box 123"
mistake_why_en = "post office box entered where IRCC requires a permanent residential address"
mistake_why_zh = "IRCC 要求永久住址，却填写了邮政信箱"
copy_en = "Enter the permanent home address. Do not use a temporary address or post office box, and do not abbreviate a street type when the full name is available."
copy_zh = "填写永久家庭住址。不要用临时地址或邮政信箱；街道类型有全称时不要缩写。"

[[fields]]
n = "10"
key = "travel_date"
section_en = "Section 4 · Travel and background"
section_zh = "第 4 段 · 行程与背景"
example = "2026-09-15"
mistake = "2026-09-14"
mistake_why_en = "departure date entered instead of the date the flight reaches Canada"
mistake_why_zh = "填了出发日期，没有按航班抵达加拿大的日期填写"
copy_en = "If you know the date, enter the planned travel date and any confirmed departure time requested. Select No when the date is not known."
copy_zh = "已知日期时填写计划旅行日期，并按要求填写已确认的起飞时间。不知道日期时选择 No。"

[[fields]]
n = "11"
key = "background_questions"
section_en = "Section 4 · Travel and background"
section_zh = "第 4 段 · 行程与背景"
example = "No to each question"
mistake = "No, because the refusal was not for Canada"
mistake_why_en = "a visa refusal by another country omitted from a question covering any country"
mistake_why_zh = "问题涵盖所有国家，却漏报了其他国家的拒签"
copy_en = "Answer each immigration, criminal, tuberculosis, and listed health question separately. Give full dates, places, reasons, offences, and sentences for every Yes answer."
copy_zh = "逐项回答移民记录、刑事、结核病和列明健康问题。每个 Yes 都要补齐日期、地点、原因、罪名和处罚。"
