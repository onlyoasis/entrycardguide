# India e-Arrival Card — field-by-field display data for the how-to-fill layout.

[[fields]]
n = "01"
key = "full_name"
section_en = "Section 1 · Identity"
section_zh = "第 1 段 · 身份"
example = "TARO KEN YAMADA"
mistake = "TARO YAMADA"
mistake_why_en = "middle given name omitted"
mistake_why_zh = "漏填了护照上的中间名"
copy_en = "Copy the complete Latin-script name from the passport used for this trip."
copy_zh = "按本次旅行使用的护照，填写完整 Latin 字母姓名。"

[[fields]]
n = "02"
key = "nationality"
section_en = "Section 1 · Identity"
section_zh = "第 1 段 · 身份"
example = "Japan"
mistake = "Singapore"
mistake_why_en = "transit country selected instead of passport nationality"
mistake_why_zh = "把转机国家选成了护照国籍"
copy_en = "Select the nationality or region of the passport presented at Indian immigration."
copy_zh = "选择入境印度时出示护照所载的国籍或地区。"

[[fields]]
n = "03"
key = "passport_number"
section_en = "Section 1 · Identity"
section_zh = "第 1 段 · 身份"
example = "A12345678"
mistake = "A12345678<"
mistake_why_en = "MRZ filler mark copied with the passport number"
mistake_why_zh = "把机读区填充符和护照号一起复制了"
copy_en = "Copy only the passport number from the photo page. Do not add spaces or MRZ filler marks."
copy_zh = "只填写资料页上的护照号，不要加入空格或机读区填充符。"

[[fields]]
n = "04"
key = "visa_or_oci_number"
section_en = "Section 1 · Identity"
section_zh = "第 1 段 · 身份"
example = "ETA or OCI number"
mistake = "e-Arrival reference"
mistake_why_en = "arrival-card reference entered instead of visa, e-Visa, or OCI record"
mistake_why_zh = "把入境卡参考编号当成签证、e-Visa 或 OCI 编号"
copy_en = "Use the visa or e-Visa reference that permits this trip, or the OCI number if travelling as an OCI cardholder."
copy_zh = "签证旅客填写本次签证或 e-Visa 编号；OCI 持有人填写 OCI 编号。"

[[fields]]
n = "05"
key = "purpose"
section_en = "Section 2 · Visit"
section_zh = "第 2 段 · 访问"
example = "Tourist"
mistake = "Business"
mistake_why_en = "business selected for a holiday trip"
mistake_why_zh = "旅游行程误选成商务"
copy_en = "Choose the purpose that matches the travel permission and the activity planned in India."
copy_zh = "按旅行许可和在印度的实际活动选择访问目的。"

[[fields]]
n = "06"
key = "arrival_date"
section_en = "Section 2 · Visit"
section_zh = "第 2 段 · 访问"
example = "2026-09-15"
mistake = "2026-09-14"
mistake_why_en = "departure date entered instead of India arrival date"
mistake_why_zh = "填了出发日期，没有填抵达印度日期"
copy_en = "Use the local date the flight reaches India. This checker uses YYYY-MM-DD; the official form displays DD/MM/YYYY."
copy_zh = "填写航班抵达印度的当地日期。本地检查器使用 YYYY-MM-DD；官网显示 DD/MM/YYYY。"

[[fields]]
n = "07"
key = "flight_number"
section_en = "Section 2 · Visit"
section_zh = "第 2 段 · 访问"
example = "AI302"
mistake = "Q7AB2C"
mistake_why_en = "booking reference entered instead of the arriving flight number"
mistake_why_zh = "把订位编号填成了抵达航班号"
copy_en = "Enter the airline code and number of the flight landing in India."
copy_zh = "填写落地印度航班的航空公司代码和航班号。"

[[fields]]
n = "08"
key = "countries_visited_last_6_days"
section_en = "Section 2 · Visit"
section_zh = "第 2 段 · 访问"
example = "Singapore, Thailand"
mistake = "No Country Visited"
mistake_why_en = "a recent stop outside India was omitted"
mistake_why_zh = "漏报了近 6 日内到过的国家"
copy_en = "Report every country requested for the previous 6 days. Select No Country Visited only when it is true."
copy_zh = "按官网要求申报过去 6 日到过的国家。确实没有时才选择 No Country Visited。"

[[fields]]
n = "09"
key = "india_address"
section_en = "Section 3 · India address"
section_zh = "第 3 段 · 印度地址"
example = "The Imperial, Janpath, New Delhi"
mistake = "Delhi"
mistake_why_en = "city entered without the hotel or street address"
mistake_why_zh = "只填了城市，没有酒店或街道地址"
copy_en = "Enter the first full hotel, host, or residence address in India."
copy_zh = "填写抵达后的第一个完整酒店、亲友或住所地址。"

[[fields]]
n = "10"
key = "state"
section_en = "Section 3 · India address"
section_zh = "第 3 段 · 印度地址"
example = "Delhi"
mistake = "Uttar Pradesh"
mistake_why_en = "nearby state selected instead of the address jurisdiction"
mistake_why_zh = "选择了邻近邦，没有按住宿地址选择"
copy_en = "Select the state or union territory shown in the accommodation address."
copy_zh = "按住宿地址选择对应的邦或中央直辖区。"

[[fields]]
n = "11"
key = "district"
section_en = "Section 3 · India address"
section_zh = "第 3 段 · 印度地址"
example = "New Delhi"
mistake = "Central Delhi"
mistake_why_en = "district guessed without checking the hotel address"
mistake_why_zh = "没有核对酒店地址，凭感觉选择了区"
copy_en = "Confirm the district with the hotel or host when it is not clear from the address."
copy_zh = "地址里看不出所属区时，向酒店或接待人确认。"

[[fields]]
n = "12"
key = "email"
section_en = "Section 4 · Contact"
section_zh = "第 4 段 · 联系方式"
example = "travel@gmail.com"
mistake = "travel@gmial.com"
mistake_why_en = "domain typo may block the confirmation message"
mistake_why_zh = "邮箱域名拼错，可能收不到确认"
copy_en = "Use an inbox you control and check the domain before submitting."
copy_zh = "使用自己掌握的邮箱，提交前再核对一次域名。"

[[fields]]
n = "13"
key = "contact_number"
section_en = "Section 4 · Contact"
section_zh = "第 4 段 · 联系方式"
example = "+81 90 1234 5678"
mistake = "090 1234 5678"
mistake_why_en = "country code omitted from an international contact number"
mistake_why_zh = "国际联系电话漏了国家或地区代码"
copy_en = "Include the country or region code and a number where you can be reached."
copy_zh = "填写国家或地区代码，以及可以联系到你的号码。"

[[fields]]
n = "14"
key = "emergency_contact_number"
section_en = "Section 4 · Contact"
section_zh = "第 4 段 · 联系方式"
example = "+81 80 9876 5432"
mistake = "+81 90 1234 5678"
mistake_why_en = "traveller's own number repeated as the emergency contact"
mistake_why_zh = "把旅客本人的号码重复填成紧急联系人"
copy_en = "If supplied, use a reachable emergency contact and include the country or region code."
copy_zh = "如填写，请使用能接通的紧急联系人号码，并加国家或地区代码。"

[[fields]]
n = "15"
key = "declaration"
section_en = "Section 5 · Declaration"
section_zh = "第 5 段 · 声明"
example = "Confirmed after review"
mistake = "Confirmed before checking"
mistake_why_en = "truth declaration accepted before the answers were reviewed"
mistake_why_zh = "没有核对答案就确认真实性声明"
copy_en = "Confirm only after checking every answer. False information may lead to denial of entry or legal consequences."
copy_zh = "核对全部答案后再确认。虚假信息可能导致拒绝入境或法律后果。"
