# Vietnam — official government URLs
# Update this file when policy changes. All pages auto-update via {{< official-link >}} shortcode.
# Last verified: 2026-06-29

[evisa]
url = "https://evisa.gov.vn"
name = "Vietnam E-Visa (Official)"
agency = "Vietnam Immigration Department (Cục Quản lý xuất nhập cảnh)"
last_verified = "2026-06-29"
archive_url = "https://web.archive.org/web/2026/https://evisa.gov.vn"
notes = "Reserved under .gov.vn — only Vietnamese government entities can register this domain suffix. The legacy evisa.xuatnhapcanh.gov.vn page says the e-visa portal moved to evisa.gov.vn and thithucdientu.gov.vn on 2024-11-11. Government fee: USD $25 single-entry, USD $50 multi-entry. This is a real fee, not free."

[evisa_alt]
url = "https://thithucdientu.gov.vn"
name = "Vietnam National Electronic Visa System (Vietnamese domain)"
agency = "Vietnam Immigration Department"
last_verified = "2026-06-29"
notes = "Second official domain named in the old Immigration Department portal notice."

[immigration_home]
url = "https://www.xuatnhapcanh.gov.vn"
name = "Vietnam Immigration Department (home)"
agency = "Vietnam Immigration Department"
last_verified = "2026-06-29"

# Country-page metadata (consumed by country-form layout).
# Bilingual fields use `_en` / `_zh` suffixes. Keep both translations in sync.
# Vietnam is the one PAID government program in our roster — fee is real.
[meta]
flag = "🇻🇳"
name_en = "Vietnam"
name_zh = "越南"
form_code = "E-Visa"
guide_slug = "evisa"
form_key = "evisa"
form_name_en = "Electronic Visa"
form_name_zh = "电子签证"
since_en = "official program"
since_zh = "官方电子签证项目"
fee_en = "USD $25 single / $50 multi"
fee_zh = "单次 25 美元 / 多次 50 美元"
suffix = ".gov.vn"

# Used by the how-to-fill layout. Vietnam's form is longer than the others —
# it includes photo upload and full passport scan, both validated by humans.
field_count = 25
sections = 5
time_needed_en = "~15 minutes"
time_needed_zh = "约 15 分钟"
output_en = "Hand the printed e-visa with your passport. Officer scans, stamps. Print the PDF — some airlines refuse boarding without a paper copy."
output_zh = "把打印好的电子签证连同护照一起递上。警官扫描、盖章。一定要打印 PDF——部分航司没有纸质件不让登机。"

# Override the generic "No printout needed" step on the how-to-fill page.
# Vietnam's e-visa is the one form in our roster that REQUIRES a paper copy.
printout_title_en = "Print the PDF — required"
printout_title_zh = "必须打印 PDF"
printout_body_en = "Some airlines (Vietjet, Bamboo) refuse boarding without a paper e-visa. Vietnamese officers also expect printed. A screenshot on your phone is not enough."
printout_body_zh = "部分航司（Vietjet、Bamboo）没有纸质电子签证不让登机。越南警官也默认要纸质件。手机截图不够。"

# Override the generic "email arrives in a few minutes" step. Vietnam's e-visa
# is human-reviewed: you get a receipt email immediately, but the approved
# visa PDF only arrives 3 working days later (or 1 day for express).
# Showing "a few minutes" would make the receipt look like approval.
email_title_en = "Receipt now, visa in 3 working days"
email_title_zh = "回执立刻到，签证 3 个工作日后下发"
email_body_en = "Within minutes you get a receipt confirming submission. The approved e-visa PDF arrives by email 3 working days later (1 day for express). Don't book travel until you have the PDF — the receipt is not a visa."
email_body_zh = "几分钟内会收到一封确认提交的回执邮件。审批后的电子签证 PDF 要 3 个工作日后才会发到邮箱（加急 1 个工作日）。拿到 PDF 之前不要订机票——回执不是签证。"

# Override the generic "officer looks you up by passport" step. Vietnam's
# e-visa can fail BEFORE immigration — airlines check at the boarding gate,
# and a passport lookup at arrivals doesn't help with a missing/wrong-port
# visa. Don't tell e-visa travelers a passport lookup is a safety net.
verification_title_en = "If verification fails — fix it before you fly"
verification_title_zh = "万一被拒——出发前就要处理"
verification_body_en = "Airlines verify the e-visa at the boarding gate. If the gate rejects you (wrong port of entry, expired window, no approved PDF), there's no in-airport fallback in Vietnam — you'd need to apply again and re-book. Confirm the approved PDF matches your itinerary 24h before departure."
verification_body_zh = "航司在登机口核验电子签证。被卡（口岸不对、过期、没有审批 PDF）就只能重新申请并重订机票——在越南机场没有补救通道。出发前 24 小时确认审批 PDF 和行程一致。"

# Used by the is-ivisa layout. Names the headline middleman this page rebuts.
# Vietnam's case is "overcharging for a real $25 fee", not "charging for a free service".
primary_middleman = "iVisa"
page_question_en = "Is iVisa the official Vietnam E-Visa site?"
page_question_zh = "iVisa 是越南官方电子签证网站吗？"
page_answer_en = "No."
page_answer_zh = "不是。"

# Used by the is-ivisa layout. Three cases for "what happened to your money."
# Vietnam is unique in the roster: the e-visa is a REAL paid government program
# (USD $25 / $50). iVisa overcharges 2–8x on top, instead of charging for free.
[[outcomes]]
case = "Case 1"
tag_en = "Most common"
tag_zh = "最常见"
headline_en = "iVisa filed the real e-visa and charged 2–8× the government fee."
headline_zh = "iVisa 替你提交了真实电子签证，但收了政府费的 2–8 倍。"
body_en = "Government fee is USD $25 (single) / $50 (multi). iVisa typically bills USD $80–250. You got a valid visa; you overpaid. Dispute the markup with your card issuer."
body_zh = "政府费是单次 25 美元 / 多次 50 美元。iVisa 通常收 80–250 美元。签证是真的，只是多付了。把溢价部分和发卡行申诉。"

[[outcomes]]
case = "Case 2"
tag_en = "Watch for"
tag_zh = "需留意"
headline_en = "iVisa applied at the wrong port of entry."
headline_zh = "iVisa 替你填了错的入境口岸。"
body_en = "Vietnam e-visas lock you to a specific entry port. If iVisa picked SGN but you fly into HAN, you'll be turned back at the gate. Verify the port matches your itinerary before travel."
body_zh = "越南电子签证会锁定具体入境口岸。iVisa 选了 SGN 但你飞 HAN，会被卡在登机口。出行前核对口岸和行程是否一致。"

[[outcomes]]
case = "Case 3"
tag_en = "Rare"
tag_zh = "罕见"
headline_en = "iVisa's photo or passport scan was rejected and they kept the fee."
headline_zh = "iVisa 提交的照片或护照扫描被拒签，但费用没退。"
body_en = "Government processing returned \"rejected\" but iVisa's terms often don't refund. Reapply directly at evisa.gov.vn with a corrected photo — costs the real USD $25."
body_zh = "政府审核返回 \"rejected\"，但 iVisa 的条款经常不退费。换张合规照片直接到 evisa.gov.vn 重新提交——只花真正的 25 美元。"

# Known scam / overcharging middleman domains (for scam-site shortcode)
# IMPORTANT: Vietnam e-visa scams overcharge for a real $25 fee, rather than charging
# for a free service. Frame the warnings accordingly.
# Every entry must:
#   1. Resolve via DNS (we audit this with `dig`)
#   2. Have documented evidence we have personally observed
#   3. Reference public news / government warnings where available
[[scam_sites]]
domain = "vietnam-evisa.org"
first_observed = "2024-03-15"
evidence = "Live commercial reseller charging fees on top of the $25 USD government e-visa. Uses .org to mimic an official-looking domain. DNS active 2026-06-11."

[[scam_sites]]
domain = "evisa-vietnam.com"
first_observed = "2024-06-10"
evidence = "Live commercial reseller copying the official site's UI; bills above the $25 government fee. DNS active 2026-06-11."

[[scam_sites]]
domain = "ivisa.com"
path = "/vietnam"
first_observed = "2023-01-01"
evidence = "Commercial visa middleman charging multiple times the $25 government e-visa fee."
