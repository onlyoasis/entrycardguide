# Known scam / overcharging middleman domains (for scam-site shortcode)
# IMPORTANT: Vietnam e-visa scams overcharge for a real $25 fee, rather than charging
# for a free service. Frame the warnings accordingly.
# Every entry must:
#   1. Resolve via DNS (we audit this with `dig`)
#   2. Have documented evidence we have personally observed
#   3. Reference public news / government warnings where available
[[scam_sites]]
domain = "vietnam-evisa.org"
first_observed = "2024-03-15"
evidence = "Live commercial reseller charging fees on top of the $25 USD government e-visa. Uses .org to mimic an official-looking domain. DNS active 2026-04-26."

[[scam_sites]]
domain = "evisa-vietnam.com"
first_observed = "2024-06-10"
evidence = "Live commercial reseller copying the official site's UI; bills above the $25 government fee. DNS active 2026-04-26."

[[scam_sites]]
domain = "ivisa.com"
path = "/vietnam"
first_observed = "2023-01-01"
evidence = "Commercial visa middleman charging multiple times the $25 government e-visa fee."

[[scam_sites]]
domain = "vietnam-visa-online.com"
first_observed = "2024-09-05"
evidence = "Live commercial reseller running ads for visa-on-arrival service that requires a sponsor letter, separate from the e-visa they bill for. DNS active 2026-04-26."
