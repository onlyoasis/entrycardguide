# Commercial Türkiye e-Visa middlemen observed through current public pages.
# Evidence records only what each site stated or charged on 2026-07-14.
[[scam_sites]]
domain = "evisa.govn.tr"
path = "/official/en-us/"
first_observed = "2026-07-14"
evidence = "Observed 2026-07-14: the look-alike domain titled itself 'Republic of Türkiye Electronic Visa (e-Visa) - Portal Version 2.0', called its USD $20-$100 range a government fee, and claimed US and UK citizens could receive authorization, although ordinary US and UK tourist passports are currently visa-exempt and the government domain is evisa.gov.tr."

[[scam_sites]]
domain = "turkey-visa.org"
path = "/"
first_observed = "2026-07-14"
evidence = "Observed 2026-07-14: the page listed a USD $91 standard service fee or USD $114 urgent service fee, plus a stated USD $13-$99 government fee, for final totals of USD $104-$213."

[[scam_sites]]
domain = "turkey.gwsg.org"
path = "/en_US"
first_observed = "2026-07-14"
evidence = "Observed 2026-07-14: the page presented Turkey tourist visa products at USD $119 and USD $120 excluding VAT and said eligible travellers were required to apply online, without first separating visa-exempt passports."

[[scam_sites]]
domain = "visasforms.com"
path = "/Turkey"
first_observed = "2026-07-14"
evidence = "Observed 2026-07-14: the page called itself an 'Official Turkey eVisa Service' and advertised a USD $95 service fee including the government fee, while later acknowledging that applicants can apply directly on the government website."
