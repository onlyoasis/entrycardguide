# Indonesia — official government URLs
# Update this file when policy changes. All pages auto-update via {{< official-link >}} shortcode.
# Last verified: 2026-04-26

[ecd]
url = "https://ecd.beacukai.go.id"
name = "Indonesia Electronic Customs Declaration (e-CD)"
agency = "Direktorat Jenderal Bea dan Cukai (Indonesian Directorate General of Customs and Excise)"
last_verified = "2026-04-26"
archive_url = "https://web.archive.org/web/2026/https://ecd.beacukai.go.id"
notes = "Reserved under .go.id — only Indonesian government entities can register this domain suffix. Required for all arriving travelers (including Indonesian citizens) since 2022. Free."

[evoa]
url = "https://molina.imigrasi.go.id"
name = "Indonesia Electronic Visa on Arrival (e-VOA)"
agency = "Direktorat Jenderal Imigrasi (Indonesian Directorate General of Immigration)"
last_verified = "2026-04-26"
notes = "For nationalities not covered by visa-free entry. Government fee: IDR 500,000 (~USD $35). Different from the e-CD which is free. Both may be required."

[immigration_home]
url = "https://www.imigrasi.go.id"
name = "Indonesia Immigration (home)"
agency = "Direktorat Jenderal Imigrasi"
last_verified = "2026-04-26"

# Country-page metadata (consumed by country-form layout).
# Bilingual fields use `_en` / `_zh` suffixes. Keep both translations in sync.
# Primary main-form page covers the free e-CD; e-VOA is a separate paid path.
[meta]
flag = "🇮🇩"
name_en = "Indonesia"
name_zh = "印度尼西亚"
form_code = "e-CD"
guide_slug = "e-cd"
form_name_en = "Electronic Customs Declaration"
form_name_zh = "电子海关申报"
since_en = "since 2022"
since_zh = "2022 年起"
fee_en = "Free"
fee_zh = "免费"
suffix = ".go.id"

# Used by the how-to-fill layout.
field_count = 12
sections = 4
time_needed_en = "~5 minutes"
time_needed_zh = "约 5 分钟"
output_en = "Scan the QR at the customs gate, walk through the green lane. Answered \"yes\" to anything? You'll be routed to the red-lane secondary check."
output_zh = "在海关闸口扫二维码，走绿色通道。海关问题答了 \"yes\" 就走红色通道做二次核查。"

# Used by the is-ivisa layout. Names the headline middleman this page rebuts.
primary_middleman = "iVisa"
page_question_en = "Is iVisa the official e-CD site?"
page_question_zh = "iVisa 是官方 e-CD 网站吗？"
page_answer_en = "No."
page_answer_zh = "不是。"

# Used by the is-ivisa layout. Three cases for "what happened to your money."
# Indonesia is unusual: the e-CD is free, but iVisa also bundles the paid
# e-VOA — so cases reflect both surfaces.
[[outcomes]]
case = "Case 1"
tag_en = "Most common"
tag_zh = "最常见"
headline_en = "iVisa filed the real e-CD and pocketed the fee."
headline_zh = "iVisa 替你提交了真实 e-CD，费用归它。"
body_en = "You arrive with a working QR for customs; you overpaid for a free form. Dispute the charge with your card issuer."
body_zh = "你过海关时有可用的二维码；只是免费表单付了冤枉钱。和发卡行申诉这笔费用。"

[[outcomes]]
case = "Case 2"
tag_en = "Watch for"
tag_zh = "需留意"
headline_en = "iVisa bundled e-VOA and charged a markup on top."
headline_zh = "iVisa 把 e-VOA 一起捆绑，又在政府费上加价。"
body_en = "The USD 35 e-VOA government fee is real, but iVisa adds USD 30–60 service fees. If you need an e-VOA, file directly at molina.imigrasi.go.id."
body_zh = "35 美元的 e-VOA 政府费是真的，但 iVisa 还加 30–60 美元服务费。需要 e-VOA 直接到 molina.imigrasi.go.id 提交。"

[[outcomes]]
case = "Case 3"
tag_en = "Rare"
tag_zh = "罕见"
headline_en = "iVisa filed nothing and you find out at customs."
headline_zh = "iVisa 什么也没提交，你过海关时才发现。"
body_en = "Customs lets you fill the e-CD at a kiosk in arrivals, but it slows you down. File it yourself before travel."
body_zh = "海关会让你在到达大厅自助机现填 e-CD，但会拖慢你的入境。出行前自己提交可以规避。"

