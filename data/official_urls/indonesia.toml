# Used by the is-ivisa layout. Names the headline middleman this page rebuts.
primary_middleman = "iVisa"
page_question_en = "Is iVisa the official e-CD site?"
page_question_zh = "iVisa 是官方 e-CD 网站吗？"
page_answer_en = "No."
page_answer_zh = "不是。"

# Override the generic free-form "any fee = middleman" answers because
# Indonesia has TWO official flows: the free e-CD (customs) plus the paid
# USD $35 e-VOA (visa). Travelers who need a visa shouldn't be steered away
# from the legitimate $35 government payment.
payment_answer_en = "The All Indonesia / e-CD arrival declaration is free. The e-VOA has a real USD $35 government fee paid to evisa.imigrasi.go.id. Any declaration fee is a middleman; anything above $35 for the e-VOA is markup."
payment_answer_zh = "All Indonesia / e-CD 入境申报是免费的。e-VOA 有真实的 USD $35 政府费，付到 evisa.imigrasi.go.id。入境申报收任何费用就是中介；e-VOA 超过 35 美元的就是加价。"

# Used by the is-ivisa layout. Three cases for "what happened to your money."
# Indonesia is unusual: the e-CD is free, but iVisa also bundles the paid
# e-VOA — so cases reflect both surfaces.
[[outcomes]]
case = "Case 1"
tag_en = "Most common"
tag_zh = "最常见"
headline_en = "iVisa filed the real e-CD and pocketed the fee."
headline_zh = "iVisa 替你提交了真实 e-CD，费用归它。"
body_en = "You arrive with a working QR for customs; you overpaid for a free form. Dispute the charge with your card issuer."
body_zh = "你过海关时有可用的二维码；只是免费表单付了冤枉钱。和发卡行申诉这笔费用。"

[[outcomes]]
case = "Case 2"
tag_en = "Watch for"
tag_zh = "需留意"
headline_en = "iVisa bundled e-VOA and charged a markup on top."
headline_zh = "iVisa 把 e-VOA 一起捆绑，又在政府费上加价。"
body_en = "The USD 35 e-VOA government fee is real, but iVisa adds USD 30–60 service fees. If you need an e-VOA, file directly at evisa.imigrasi.go.id."
body_zh = "35 美元的 e-VOA 政府费是真的，但 iVisa 还加 30–60 美元服务费。需要 e-VOA 直接到 evisa.imigrasi.go.id 提交。"

[[outcomes]]
case = "Case 3"
tag_en = "Rare"
tag_zh = "罕见"
headline_en = "iVisa filed nothing and you find out at customs."
headline_zh = "iVisa 什么也没提交，你过海关时才发现。"
body_en = "Customs lets you fill the e-CD at a kiosk in arrivals, but it slows you down. File it yourself before travel."
body_zh = "海关会让你在到达大厅自助机现填 e-CD，但会拖慢你的入境。出行前自己提交可以规避。"

# Known scam / middleman domains (for scam-site shortcode)
# Every entry must:
#   1. Resolve via DNS (we audit this with `dig`)
#   2. Have documented evidence we have personally observed
#   3. Reference public news / government warnings where available
[[scam_sites]]
domain = "indonesia-evoa.com"
first_observed = "2024-08-22"
evidence = "Live commercial reseller charging above the $35 USD government e-VOA fee, including a markup masquerading as 'service fee'. DNS active 2026-04-26."

[[scam_sites]]
domain = "ivisa.com"
path = "/indonesia"
first_observed = "2023-01-01"
evidence = "Commercial visa middleman charging fees on top of Indonesia's free e-CD and government e-VOA."
