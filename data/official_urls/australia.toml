[eta601]
url = "https://immi.homeaffairs.gov.au/visas/getting-a-visa/visa-listing/electronic-travel-authority-601"
name = "Electronic Travel Authority (subclass 601)"
agency = "Australian Department of Home Affairs"
last_verified = "2026-07-14"
archive_url = "https://web.archive.org/web/2026/https://immi.homeaffairs.gov.au/visas/getting-a-visa/visa-listing/electronic-travel-authority-601"
notes = "App-only: ETA 601 applications must be made in the AustralianETA App; there is no official web form for ETA 601. Verified 2026-07-14 against this Home Affairs page and https://immi.homeaffairs.gov.au/supporting/files/australian-eta-app-industry-guidance.pdf. The app scans the passport data page, reads the ePassport chip with NFC, takes a live photo, collects personal and ETA answers, and submits payment. There is no Visa Application Charge, but Home Affairs charges an AUD $20 App application service fee. An ETA normally permits multiple entries during 12 months from grant, or until the linked passport expires if sooner, with stays of up to 3 months per visit. Most applicants receive a result immediately, but some applications require more information or longer processing. Home Affairs publishes no application-completion time; the ~15 minute site estimate below is a planning estimate for the six guide steps, not an official promise."

[eta_app]
name = "AustralianETA"
developer = "Department of Home Affairs"
google_play_url = "https://play.google.com/store/apps/details?id=au.gov.homeaffairs.eta"
app_store_url = "https://apps.apple.com/au/app/australianeta/id1527982364"
guidance_url = "https://immi.homeaffairs.gov.au/supporting/files/australian-eta-app-industry-guidance.pdf"
last_verified = "2026-07-14"
notes = "Verified 2026-07-14 by following the Apple App Store and Google Play links in Home Affairs guidance. Both stores identify the app as AustralianETA and the developer as Department of Home Affairs. The app itself is free to download; each submitted ETA application carries the AUD $20 application service fee."

[evisitor651]
url = "https://immi.homeaffairs.gov.au/visas/getting-a-visa/visa-listing/evisitor-651"
name = "eVisitor (subclass 651)"
agency = "Australian Department of Home Affairs"
last_verified = "2026-07-14"
archive_url = "https://web.archive.org/web/2026/https://immi.homeaffairs.gov.au/visas/getting-a-visa/visa-listing/evisitor-651"
notes = "Verified 2026-07-14. eVisitor 651 is free and is applied for online through Home Affairs and ImmiAccount, not through the AustralianETA App. It is available to citizens holding eligible European passports. It permits multiple entries during 12 months from grant, with stays of up to 3 months per visit. Applicants must be outside Australia when they apply and when Home Affairs decides the application. Several European passports are eligible for both ETA 601 and eVisitor 651; eligible European travellers can use the free eVisitor route."

