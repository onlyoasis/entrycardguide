first_observed = "2026-07-14"
evidence = "Observed 2026-07-14: the page advertised an expert-reviewed New Zealand ETA application starting from USD $99.99 and said iVisa would review and submit the application to the government; the page also stated that iVisa is not the New Zealand government."

[[scam_sites]]
domain = "nzeta.visaonline.travel"
path = "/n/visa-fee/visa-fee"
first_observed = "2026-07-14"
evidence = "Observed 2026-07-14: the page listed a USD $69 standard service fee per applicant, with 'Plus USD $79' emergency and 'Plus USD $99' rush options, separately from its stated USD $18 government fee and USD $64 IVL; its footer described the operator as a professional travel agency."

[[scam_sites]]
domain = "newzealandetavisa.co.nz"
path = "/fees"
first_observed = "2026-07-14"
evidence = "Observed 2026-07-14: the fee page listed Tourist/Business NZeTA at USD $135, Express NZeTA at USD $170, and Transit NZeTA at USD $85. Its Apply Now link led to an application-assistance service rather than an immigration.govt.nz application page."

[[scam_sites]]
domain = "newzealandvisaonline.com"
path = "/news/new-zealand-traveller-declaration"
first_observed = "2026-07-14"
evidence = "Observed 2026-07-14: the page offered optional New Zealand Traveller Declaration support for USD $39 while acknowledging that the official NZTD is free and that the service is not affiliated with the New Zealand Government or the official NZTD website."
