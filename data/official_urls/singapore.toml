# Used by the is-ivisa layout. Three cases for "what happened to your money."
[[outcomes]]
case = "Case 1"
tag_en = "Most common"
tag_zh = "最常见"
headline_en = "iVisa filed the real SGAC and kept the fee."
headline_zh = "iVisa 替你提交了真实 SGAC，把费用收走了。"
body_en = "Your SGAC links to your passport at the e-gate; you overpaid. Dispute the charge with your card issuer."
body_zh = "你的 SGAC 在电子通道会自动关联护照；只是多付了钱。和发卡行申诉这笔费用。"

[[outcomes]]
case = "Case 2"
tag_en = "Reported"
tag_zh = "有过案例"
headline_en = "iVisa filed nothing and you arrive without an SGAC."
headline_zh = "iVisa 什么都没提交，你抵达时没有 SGAC 记录。"
body_en = "ICA may let you file at the kiosk in the arrivals hall, or refer you to a secondary desk. File it yourself before travel to avoid this."
body_zh = "ICA 可能让你在到达大厅的自助机现填，或转去二线柜台。出行前自己提交可以彻底规避。"

[[outcomes]]
case = "Case 3"
tag_en = "Rare"
tag_zh = "罕见"
headline_en = "iVisa filed for the wrong traveler / typo case."
headline_zh = "iVisa 替错了人填，或者出现笔误。"
body_en = "An SGAC under the wrong passport number doesn't work at e-gate. Refile with your real data on the ICA site."
body_zh = "护照号错的 SGAC 在电子通道无法识别。在 ICA 官方站用真数据重新提交。"

# Known scam / middleman domains (for scam-site shortcode)
# Every entry must:
#   1. Resolve via DNS (we audit this with `dig`)
#   2. Have documented evidence we have personally observed
#   3. Reference public news / government warnings where available
#
# Note: as of 2026-04-26, the only widely-resolving Singapore-targeted middleman
# we can document is iVisa. The pattern of fake ICA-lookalike domains (e.g.
# singapore-arrivalcard.com, sg-arrival-official.net) is documented historically
# but those domains are not currently active. This list will grow as ICA names
# new operators in their public warnings.
[[scam_sites]]
domain = "ivisa.com"
path = "/singapore"
first_observed = "2023-01-01"
evidence = "Commercial visa middleman charging fees for Singapore's free SGAC. Not affiliated with ICA."
