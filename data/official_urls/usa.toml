# Commercial ESTA middlemen observed through current public pages.
# Evidence records only what each site stated or charged on 2026-07-13.
[[scam_sites]]
domain = "ivisa.com"
path = "/visas/usa"
first_observed = "2026-07-13"
evidence = "Observed 2026-07-13: the iVisa United States page advertised ESTA prices starting from USD $109.99. The official ESTA site displayed USD $40.27, so the advertised starting total was USD $69.72 higher."

[[scam_sites]]
domain = "esta.global"
path = "/apply/"
first_observed = "2026-07-13"
evidence = "Observed 2026-07-13: the application page stated 'Total price from $129 per applicant' including the government fee and its service fee. The official ESTA site displayed USD $40.27, a difference of at least USD $88.73."

[[scam_sites]]
domain = "travelusaesta.com"
path = "/terms.html"
first_observed = "2026-07-13"
evidence = "Observed 2026-07-13: the terms page listed USD $140 per application, including the government fee, for ESTA submission support. The official ESTA site displayed USD $40.27, a difference of USD $99.73."
