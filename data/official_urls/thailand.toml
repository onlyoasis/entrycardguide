# Thailand — official government URLs
# Update this file when policy changes. All pages auto-update via {{< official-link >}} shortcode.
# Last verified: 2026-06-11

[tdac]
url = "https://tdac.immigration.go.th"
name = "Thailand Digital Arrival Card"
agency = "Royal Thai Immigration Bureau"
last_verified = "2026-06-22"
archive_url = "https://web.archive.org/web/2026/https://tdac.immigration.go.th"
notes = "Reserved under .go.th — only Thai government entities can register this domain suffix."

[immigration_home]
url = "https://www.immigration.go.th"
name = "Thai Immigration Bureau (home)"
agency = "Royal Thai Immigration Bureau"
last_verified = "2026-06-11"

# Country-page metadata (consumed by country-form layout).
# Bilingual fields use `_en` / `_zh` suffixes. Keep both translations in sync.
[meta]
flag = "🇹🇭"
name_en = "Thailand"
name_zh = "泰国"
form_code = "TDAC"
# URL slug for the main-form page (the file at content/{country}/{guide_slug}.md).
# Separate from form_code because display codes (E-Ticket, FMM-E) differ from URL slugs.
guide_slug = "tdac"
# Top-level TOML key for this country's main form data (e.g. `[tdac]` block above).
# Can differ from guide_slug — e.g. Indonesia uses `[ecd]` block + `e-cd` URL slug.
form_key = "tdac"
form_name_en = "Digital Arrival Card"
form_name_zh = "数字入境卡"
since_en = "since May 2025"
since_zh = "2025 年 5 月起"
fee_en = "Free"
fee_zh = "免费"
suffix = ".go.th"

# Used by the how-to-fill layout.
field_count = 23
sections = 4
time_needed_en = "~8 minutes"
time_needed_zh = "约 8 分钟"
output_en = "Show the QR code and your passport. Officer scans, stamps, hands it back. Under 30 seconds."
output_zh = "出示二维码和护照。警官扫描、盖章、还你。一般 30 秒内完事。"

# Used by the is-ivisa layout. Names the headline middleman this page rebuts.
primary_middleman = "iVisa"
page_question_en = "Is iVisa the official TDAC site?"
page_question_zh = "iVisa 是官方 TDAC 网站吗？"
page_answer_en = "No."
page_answer_zh = "不是。"

# News source backing the hero subhead ("X% of foreign arrivals…") and the
# "Why this matters" callout. When the citation changes, update both _en/_zh.
[news]
date = "2026-03-29"
source = "Bangkok Post"
source_url = "https://www.bangkokpost.com/thailand/general/3226524/immigration-warns-of-scam-digital-arrival-card-websites"
pct = "10%"
quote_en = "About 10% of foreign arrivals had used unofficial sites and overpaid."
quote_zh = "约 10% 的外国入境者使用过非官方网站并多付了钱。"
attribution_en = "Pol Maj Gen Choengron Rimpadee, Immigration Bureau spokesman"
attribution_zh = "泰国移民局发言人 Pol Maj Gen Choengron Rimpadee"

# Used by the is-ivisa layout. Three cases for "what happened to your money."
# Order: most common first, rare last. tag_en/zh is a short qualifier badge.
[[outcomes]]
case = "Case 1"
tag_en = "Most common"
tag_zh = "最常见"
headline_en = "iVisa filed the real TDAC and kept the fee."
headline_zh = "iVisa 替你提交了真实 TDAC，把费用收走了。"
body_en = "Your arrival card is valid; you overpaid. Dispute the charge with your card issuer — the submission still works."
body_zh = "你的入境卡有效，只是多付了钱。和发卡行申诉这笔费用——提交本身没问题。"

[[outcomes]]
case = "Case 2"
tag_en = "Watch for"
tag_zh = "需留意"
headline_en = "iVisa filed a different form (e.g. a Thailand eVisa) and sent a generic confirmation."
headline_zh = "iVisa 填了另一种表（如泰国 eVisa），只发了张通用确认。"
body_en = "You may still need to file the TDAC separately. Check the email for an attachment from tdac.immigration.go.th — if not there, file the TDAC yourself before travel."
body_zh = "你可能还得另外提交 TDAC。看邮件里有没有 tdac.immigration.go.th 的附件——没有就在出行前自己提交一份。"

[[outcomes]]
case = "Case 3"
tag_en = "Rare"
tag_zh = "罕见"
headline_en = "iVisa filed nothing and you find out at the arrivals counter."
headline_zh = "iVisa 什么也没提交，你在到达柜台才发现。"
body_en = "Documented but uncommon. Officer can let you fill the TDAC at the kiosk in the arrivals hall — file it yourself before travel to avoid this."
body_zh = "有报道但罕见。警官会让你在到达大厅的自助机现填——出行前自己提交可以彻底规避。"

# Known scam domains (for scam-site shortcode)
# IMPORTANT: only add to this list after verifying the site is charging for the free TDAC
# and cross-referencing with Thai government warnings or news coverage.
# Every entry must:
#   1. Resolve via DNS (we audit this with `dig`)
#   2. Have documented evidence we have personally observed
#   3. Reference public news / government warnings where available
[[scam_sites]]
domain = "ivisa.com"
path = "/thailand"
first_observed = "2024-06-01"
evidence = "Commercial visa middleman charging fees for the free TDAC. Named in Thai immigration public warning coverage."
